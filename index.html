<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Git Practice</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #282c34;
            color: #abb2bf;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #21252b;
            padding: 2rem 4rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            color: #61afef;
        }
        .code-block {
            background-color: #1e1e1e;
            padding: 1rem;
            border-radius: 5px;
            font-family: monospace;
            color: #98c379;
            margin-top: 1rem;
            text-align: left;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Local Git Repository 💻</h1>
        <p>This is a local environment to practice Git commands safely.</p>
        <div class="code-block">
            > git init<br>
            > git add .<br>
            > git commit -m "Initial commit"
        </div>
    </div>
</body>
</html>
